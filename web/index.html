<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码审查 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 头部导航 -->
    <nav class="bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold">📊 代码审查 Dashboard</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="lastUpdate" class="text-sm text-blue-100"></span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- GitHub OAuth -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <h2 class="text-lg font-semibold text-gray-800">GitHub Webhook 快速授权</h2>
                    <p class="text-sm text-gray-500 mt-1">输入仓库地址后点击授权，完成后自动配置 webhook。</p>
                </div>
            </div>
            <form id="githubOauthForm" action="/oauth/github/start" method="GET" class="mt-4 flex flex-col md:flex-row md:items-center gap-3">
                <input
                    type="text"
                    id="repoUrlInput"
                    name="repo_url"
                    placeholder="https://github.com/owner/repo"
                    class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                    required
                >
                <button
                    type="submit"
                    class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                >
                    开始授权
                </button>
            </form>
            <div class="mt-3">
                <button id="toggleAdminConfig" type="button" class="text-xs text-blue-600 hover:text-blue-800">
                    管理员配置
                </button>
            </div>
            <form id="adminOauthForm" class="mt-4 hidden space-y-3">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input
                        type="text"
                        id="adminClientId"
                        placeholder="GITHUB_OAUTH_CLIENT_ID"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                        required
                    >
                    <input
                        type="password"
                        id="adminClientSecret"
                        placeholder="GITHUB_OAUTH_CLIENT_SECRET"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                        required
                    >
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input
                        type="text"
                        id="adminCallbackUrl"
                        placeholder="回调地址（可选）"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                    >
                    <input
                        type="text"
                        id="adminWebhookUrl"
                        placeholder="Webhook地址（可选）"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                    >
                </div>
                <div class="flex flex-col md:flex-row md:items-center gap-3">
                    <input
                        type="password"
                        id="adminPassword"
                        placeholder="管理员口令"
                        class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                        required
                    >
                    <button
                        type="submit"
                        class="px-6 py-2 bg-gray-900 text-white rounded-md hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-700 transition"
                    >
                        保存配置
                    </button>
                </div>
                <p id="adminOauthStatus" class="text-sm hidden"></p>
            </form>
            <p id="oauthStatus" class="text-sm mt-3 hidden"></p>
        </div>

        <!-- 筛选器 -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">开始日期</label>
                    <input type="date" id="startDate" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">结束日期</label>
                    <input type="date" id="endDate" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                    <select id="authors" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <option value="">全部</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">项目名</label>
                    <select id="projectNames" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <option value="">全部</option>
                    </select>
                </div>
            </div>
            <div class="mt-4 flex items-center space-x-4">
                <button onclick="loadData()" class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    查询
                </button>
                <button onclick="resetFilters()" class="px-6 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-500 transition">
                    重置
                </button>
                <div class="flex items-center space-x-2">
                    <input type="radio" id="typeMr" name="reviewType" value="mr" checked class="text-blue-600 focus:ring-blue-500">
                    <label for="typeMr" class="text-sm font-medium text-gray-700">Merge Request</label>
                    <input type="radio" id="typePush" name="reviewType" value="push" class="ml-4 text-blue-600 focus:ring-blue-500">
                    <label for="typePush" class="text-sm font-medium text-gray-700">Push</label>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-lg shadow-lg p-6 text-white">
                <h3 class="text-lg font-semibold mb-2">总记录数</h3>
                <p class="text-4xl font-bold" id="totalRecords">0</p>
            </div>
            <div class="bg-gradient-to-r from-purple-500 to-purple-600 rounded-lg shadow-lg p-6 text-white">
                <h3 class="text-lg font-semibold mb-2">平均分数</h3>
                <p class="text-4xl font-bold" id="averageScore">0.00</p>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="bg-white rounded-lg shadow-md mb-6">
            <div class="border-b border-gray-200">
                <nav class="flex -mb-px">
                    <button onclick="switchTab('data')" id="tabData" class="tab-button active px-6 py-4 text-sm font-medium text-blue-600 border-b-2 border-blue-600">
                        数据表格
                    </button>
                    <button onclick="switchTab('charts')" id="tabCharts" class="tab-button px-6 py-4 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300">
                        统计图表
                    </button>
                </nav>
            </div>

            <!-- 数据表格标签页 -->
            <div id="tabContentData" class="tab-content p-6">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">项目名</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">作者</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" id="branchHeader">源分支</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" id="targetBranchHeader">目标分支</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">更新时间</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">提交信息</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">代码变更</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">分数</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" id="urlHeader">链接</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="9" class="px-6 py-4 text-center text-gray-500">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 图表标签页 -->
            <div id="tabContentCharts" class="tab-content hidden p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-gray-50 rounded-lg p-4">
                        <h3 class="text-lg font-semibold mb-4 text-center">项目提交次数</h3>
                        <canvas id="projectCountChart"></canvas>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4">
                        <h3 class="text-lg font-semibold mb-4 text-center">项目平均分数</h3>
                        <canvas id="projectScoreChart"></canvas>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4">
                        <h3 class="text-lg font-semibold mb-4 text-center">人员提交次数</h3>
                        <canvas id="authorCountChart"></canvas>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4">
                        <h3 class="text-lg font-semibold mb-4 text-center">人员平均分数</h3>
                        <canvas id="authorScoreChart"></canvas>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4 md:col-span-2">
                        <h3 class="text-lg font-semibold mb-4 text-center">人员代码变更总行数</h3>
                        <canvas id="authorCodeLineChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
